<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stickers">
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>IRL Stickers</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #111;
            font-family: -apple-system, sans-serif;
            color: white;
        }

        /* Top navigation bar for the Edit button */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            padding-top: env(safe-area-inset-top); /* Clears the iPhone notch dynamically */
            z-index: 50;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #007aff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            padding: 20px;
            padding-top: calc(70px + env(safe-area-inset-top)); 
            padding-bottom: 100px;
        }

        /* Wrapper to hold both the sticker image and the delete badge */
        .sticker-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .grid-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        /* Little animation when in edit mode */
        .editing .grid-item {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* The Red Delete Badge */
        .delete-badge {
            display: none;
            position: absolute;
            top: -8px;
            left: -8px;
            background-color: #ff3b30;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 14px;
            font-weight: bold;
            line-height: 24px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            z-index: 10;
            cursor: pointer;
        }

        /* Show delete badges only when the app is in editing mode */
        .editing .delete-badge {
            display: block;
        }

        #add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 100;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #overlay-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button id="edit-btn" class="nav-btn" onclick="toggleEditMode()">Edit</button>
    </div>

    <div id="grid" class="grid-container"></div>

    <button id="add-btn" onclick="document.getElementById('fileInput').click()">+</button>
    <input type="file" id="fileInput" accept="image/*" multiple style="display: none;" onchange="handleFiles(this.files)">

    <div id="overlay" onclick="hideSticker()">
        <img id="overlay-image" src="">
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const overlayImage = document.getElementById('overlay-image');
        const editBtn = document.getElementById('edit-btn');
        const grid = document.getElementById('grid');
        let db;
        let isEditing = false;

        // Open Database
        const request = indexedDB.open("StickerDatabase", 1);
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            db.createObjectStore("stickers", { autoIncrement: true });
        };
        request.onsuccess = function(e) {
            db = e.target.result;
            loadStickers();
        };

        function toggleEditMode() {
            isEditing = !isEditing;
            if (isEditing) {
                grid.classList.add('editing');
                editBtn.innerText = "Done";
            } else {
                grid.classList.remove('editing');
                editBtn.innerText = "Edit";
            }
        }

        function handleFiles(files) {
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const transaction = db.transaction(["stickers"], "readwrite");
                const store = transaction.objectStore("stickers");
                store.add(file);
                transaction.oncomplete = () => loadStickers();
            }
        }

        function loadStickers() {
            grid.innerHTML = ''; 
            const transaction = db.transaction(["stickers"], "readonly");
            const store = transaction.objectStore("stickers");
            const request = store.openCursor();
            
            request.onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    const id = cursor.key; // Grab the unique database ID for this specific image

                    // Create wrapper
                    const wrapper = document.createElement('div');
                    wrapper.className = 'sticker-wrapper';

                    // Create image
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(cursor.value);
                    img.className = 'grid-item';
                    img.onclick = function() { 
                        if (!isEditing) showSticker(this.src); 
                    };
                    
                    // Create delete badge
                    const deleteBadge = document.createElement('button');
                    deleteBadge.className = 'delete-badge';
                    deleteBadge.innerText = '✕';
                    deleteBadge.onclick = function() { deleteSticker(id); };

                    wrapper.appendChild(img);
                    wrapper.appendChild(deleteBadge);
                    grid.appendChild(wrapper);
                    
                    cursor.continue();
                }
            };
        }

        // Delete photo function
        function deleteSticker(id) {
            const transaction = db.transaction(["stickers"], "readwrite");
            const store = transaction.objectStore("stickers");
            store.delete(id); // Delete from IndexedDB using the unique ID
            
            transaction.oncomplete = () => {
                loadStickers();
                // If we deleted the last item, automatically clean up UI state
                if (grid.children.length === 0 && isEditing) {
                    toggleEditMode();
                }
            };
        }

        function showSticker(src) {
            overlayImage.src = src;
            overlay.classList.add('active');
        }

        function hideSticker() {
            overlay.classList.remove('active');
            setTimeout(() => { overlayImage.src = ""; }, 200); 
        }
    </script>
</body>
</html>
